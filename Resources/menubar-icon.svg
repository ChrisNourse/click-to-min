<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- Window frame -->
  <rect x="1.75" y="2.25" width="18.5" height="13.5" rx="2"
        fill="none" stroke="black" stroke-width="1.5"/>
  <!-- Title bar divider -->
  <line x1="1.75" y1="6" x2="20.25" y2="6"
        stroke="black" stroke-width="1.5"/>
  <!-- Minimize arrow: shaft -->
  <line x1="11" y1="8.5" x2="11" y2="12.5"
        stroke="black" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Minimize arrow: head -->
  <polyline points="8.75,10.5 11,13 13.25,10.5"
            fill="none" stroke="black" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dock shelf -->
  <rect x="5" y="18" width="12" height="2" rx="1" fill="black"/>
</svg>
