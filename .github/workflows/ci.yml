name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-test:
    # Runner pin: macos-14 (Sonoma, arm64). Do not use macos-latest — toolchain
    # drift silently breaks builds. Re-pin deliberately when upgrading.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: "spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}"
          restore-keys: |
            spm-${{ runner.os }}-

      # pinned 2026-04-22, Xcode versions on this runner: 15.2, 15.3, 15.4 (source: https://github.com/actions/runner-images)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (debug)
        run: swift build -c debug

      - name: Test (with coverage)
        run: swift test --parallel --enable-code-coverage

      - name: Generate coverage report
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          XCTEST=$(find -L "$BIN_PATH" -name "*.xctest" -type d | head -1)
          BIN="${XCTEST}/Contents/MacOS/$(basename "${XCTEST}" .xctest)"
          PROFDATA=$(find -L "$BIN_PATH/codecov" -name "*.profdata" | head -1)
          xcrun llvm-cov export -format=lcov "$BIN" -instr-profile="$PROFDATA" \
            --ignore-filename-regex="(\.build|Tests)" > coverage.lcov

      - name: Report coverage on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: ./coverage.lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .build/**/TestResults

  bundle-check:
    needs: build-test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: "spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}"
          restore-keys: |
            spm-${{ runner.os }}-

      # pinned 2026-04-22, Xcode versions on this runner: 15.2, 15.3, 15.4 (source: https://github.com/actions/runner-images)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./build.sh

      - name: Verify codesign
        run: codesign --verify --verbose ClickToMin.app

      - name: Lint Info.plist
        run: plutil -lint Resources/Info.plist

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClickToMin.app
          path: ClickToMin.app
          retention-days: 7

  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install swiftformat + swiftlint
        run: brew install swiftformat swiftlint

      - name: Format lint
        # Only lint Sources. Tests intentionally use patterns (force
        # unwraps in XCTest helpers, deliberate import ordering to put
        # @testable imports last) that conflict with SwiftFormat defaults.
        run: swiftformat Sources --lint

      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml Sources
