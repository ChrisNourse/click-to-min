# TODO: add notarization before distributing beyond personal use
name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    # Runner pin: macos-14 (Sonoma, arm64). Re-pin deliberately when upgrading.
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # pinned 2026-04-22, Xcode versions on this runner: 15.2, 15.3, 15.4 (source: https://github.com/actions/runner-images)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./build.sh

      - name: Zip app bundle
        run: ditto -c -k --keepParent ClickToMin.app ClickToMin.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClickToMin.zip
