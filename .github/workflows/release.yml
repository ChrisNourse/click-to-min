# TODO: add notarization before distributing beyond personal use
name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    # Runner pin: macos-14 (Sonoma, arm64). Re-pin deliberately when upgrading.
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # pinned 2026-04-22, Xcode versions on this runner: 15.2, 15.3, 15.4 (source: https://github.com/actions/runner-images)
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build (release)
        run: swift build -c release

      - name: Assemble .app bundle
        run: ./build.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        # Produces a drag-to-Applications DMG. create-dmg handles the
        # Applications-folder symlink, window geometry, and icon
        # positioning automatically.
        #
        # NOTE: the app is only ad-hoc codesigned. Users will still need
        # to right-click → Open the first time because Gatekeeper cannot
        # verify an ad-hoc signature. Notarization is the proper fix
        # (see top-of-file TODO) and requires an Apple Developer Program
        # membership + secrets on this repo.
        run: |
          mkdir -p dmg-staging
          cp -R ClickToMin.app dmg-staging/
          create-dmg \
            --volname "ClickToMin ${GITHUB_REF_NAME}" \
            --window-pos 200 120 \
            --window-size 540 360 \
            --icon-size 96 \
            --icon "ClickToMin.app" 140 180 \
            --app-drop-link 400 180 \
            --hide-extension "ClickToMin.app" \
            --no-internet-enable \
            "ClickToMin-${GITHUB_REF_NAME}.dmg" \
            dmg-staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClickToMin-${{ github.ref_name }}.dmg
          body: |
            ## Install

            1. Download `ClickToMin-${{ github.ref_name }}.dmg` below
            2. Open it, drag **ClickToMin** into **Applications**
            3. First launch: right-click the app → **Open** → **Open** (Gatekeeper bypass for ad-hoc signed builds)
            4. Grant Accessibility when prompted (System Settings → Privacy & Security → Accessibility)

            The app is ad-hoc signed, not notarized. If you prefer, you can clear the quarantine attribute instead:

            ```
            xattr -dr com.apple.quarantine /Applications/ClickToMin.app
            ```
